name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.2.2)'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: gradle

      - name: Determine version
        id: get_version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ] && [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=$(echo "${{ github.ref }}" | sed 's/refs\/tags\/v//')
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        continue-on-error: true

      - name: Publish
        run: |
          ./gradlew publishAllPublicationsToGitHubPackagesRepository \
            -PenableGithubPublish=true \
            -PgithubUsername=${{ github.actor }} \
            -PgithubRepository=compass \
            -PgithubToken=${{ secrets.GITHUB_TOKEN }} \
            ${{ steps.get_version.outputs.version != '' && format('-Pcompass.build.version={0}', steps.get_version.outputs.version) || '' }}
