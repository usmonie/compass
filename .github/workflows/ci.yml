name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        continue-on-error: true # In case gradlew is missing in the sub-repo local checkout

      - name: Build and Test
        # Assumes gradlew is present at the root of the compass repository
        run: |
          if [ -f "./gradlew" ]; then
            ./gradlew build
          else
            echo "gradlew not found at root. If this is part of a larger project, ensure standalone build is configured."
            # Fallback if the user hasn't added gradlew to the sub-repo yet
            exit 1
          fi
